# Положить в /etc/nginx/sites-available/panel
# map должен быть на уровне http{}, поэтому выносим в отдельный файл.
# install-ubuntu.sh помещает его в /etc/nginx/conf.d/panel_map.conf

server {
    listen 80;
    server_name _;

    # Redirect HTTP -> HTTPS (раскомментируй после certbot)
    # return 301 https://$host$request_uri;

    client_max_body_size 110M;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # WebSocket (xterm + stats)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}

