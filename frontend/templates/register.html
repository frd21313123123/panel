<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Panel — Регистрация</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <h1>Panel</h1>
    <form id="regForm">
      <div class="form-group"><label>Имя пользователя</label><input name="username" required></div>
      <div class="form-group"><label>Email</label><input name="email" type="email" required></div>
      <div class="form-group"><label>Пароль</label><input name="password" type="password" required minlength="4"></div>
      <button class="btn btn-primary" style="width:100%">Зарегистрироваться</button>
    </form>
    <p style="margin-top:14px;text-align:center;" class="muted">
      Уже есть аккаунт? <a href="/login">Войти</a>
    </p>
  </div>
</div>
<script src="/static/js/app.js"></script>
<script>
document.getElementById("regForm").addEventListener("submit", async e => {
  e.preventDefault();
  const fd = new FormData(e.target);
  try {
    await api.post("/api/auth/register", {
      username: fd.get("username"), email: fd.get("email"), password: fd.get("password")
    });
    location.href = "/dashboard";
  } catch (err) { toast(err.message, "error"); }
});
</script>
</body>
</html>
