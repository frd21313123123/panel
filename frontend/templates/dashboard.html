<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Panel — Серверы</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">⚡ Panel</div>
    <nav>
      <a href="/dashboard">📦 Мои серверы</a>
      <a href="/websites">🌐 Сайты &amp; Nginx</a>
      <a href="/admin">⚙️ Администрирование</a>
      <a href="/profile">👤 Профиль</a>
    </nav>
    <div class="spacer"></div>
    <div class="user">загрузка…</div>
    <button class="btn btn-secondary" style="margin-top:8px" onclick="logout()">Выйти</button>
  </aside>
  <main class="main">
    <div class="topbar">
      <div>
        <h1>Мои серверы <span id="srvCount" class="muted" style="font-size:15px;font-weight:400"></span></h1>
        <div class="muted" style="font-size:13px;margin-top:4px">Каждый сервер — отдельный Docker-контейнер с вашими данными</div>
      </div>
      <button class="btn btn-primary" onclick="openCreate()">+ Создать сервер</button>
    </div>

    <div class="card" style="padding:12px 16px;margin-bottom:14px;background:var(--bg-3);border-left:3px solid var(--accent);">
      <div style="font-size:13px;">
        <strong>💡 Подсказка:</strong> нажмите на карточку сервера чтобы открыть консоль, управлять файлами, настраивать порты и делать бэкапы.
      </div>
    </div>

    <div id="list" class="grid"></div>
  </main>
</div>

<div id="modal"></div>

<script src="/static/js/app.js"></script>
<script>
loadSidebar("/dashboard");

const STATUS_LABEL = {
  running: "Запущен", exited: "Остановлен", offline: "Выключен",
  paused: "Приостановлен", starting: "Запускается", created: "Создан",
};

async function load() {
  const list = document.getElementById("list");
  list.innerHTML = '<div class="muted">Загрузка…</div>';
  try {
    const servers = await api.get("/api/servers");
    document.getElementById("srvCount").textContent = servers.length ? `· ${servers.length}` : "";
    if (!servers.length) {
      list.innerHTML = `
        <div class="card" style="grid-column:1/-1;text-align:center;padding:40px 20px;">
          <div style="font-size:48px;margin-bottom:8px;">📦</div>
          <h3 style="margin-bottom:6px">Пока нет серверов</h3>
          <div class="muted" style="margin-bottom:18px">Создайте первый сервер — это займёт меньше минуты</div>
          <button class="btn btn-primary" onclick="openCreate()">+ Создать первый сервер</button>
        </div>`;
      return;
    }
    list.innerHTML = servers.map(s => {
      const statusLabel = STATUS_LABEL[s.status] || s.status;
      return `
      <a href="/servers/${s.id}" class="card server-card" style="display:block;color:inherit;text-decoration:none;transition:border-color .15s;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;gap:10px;">
          <h3 style="word-break:break-word">${escapeHtml(s.name)}</h3>
          <span class="pill ${s.status}" title="Статус контейнера">${statusLabel}</span>
        </div>
        <div class="muted" style="font-size:12px;margin-bottom:12px;display:flex;align-items:center;gap:6px;">
          <span>🥚</span>
          <span>${s.egg ? escapeHtml(s.egg.name) : 'без шаблона'}</span>
          ${s.egg ? `<span>·</span><code style="font-size:11px">${escapeHtml(s.egg.docker_image)}</code>` : ''}
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;font-size:12px;">
          <div class="muted" title="Лимит оперативной памяти">
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;">RAM</div>
            <div style="color:var(--text);font-size:14px;font-weight:500;">${s.memory_mb} MB</div>
          </div>
          <div class="muted" title="Лимит CPU в процентах от одного ядра">
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;">CPU</div>
            <div style="color:var(--text);font-size:14px;font-weight:500;">${s.cpu_limit}%</div>
          </div>
          <div class="muted" title="Лимит диска (пока справочный)">
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:.05em;">Диск</div>
            <div style="color:var(--text);font-size:14px;font-weight:500;">${s.disk_mb} MB</div>
          </div>
        </div>
      </a>`;
    }).join("");
  } catch (e) { toast(e.message, "error"); list.innerHTML = `<div class="card muted">Не удалось загрузить список</div>`; }
}

function escapeHtml(s) { return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function openCreate() {
  const eggs = await api.get("/api/eggs");
  if (!eggs.length) {
    toast("Сначала создайте шаблон в «Администрирование»", "error");
    return;
  }
  document.getElementById("modal").innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal" style="max-width:560px">
        <h2>Новый сервер</h2>
        <div class="muted" style="font-size:12px;margin-bottom:16px">
          Будет создан Docker-контейнер на основе выбранного шаблона.
          Лимиты ресурсов применяются сразу.
        </div>
        <form id="createForm">
          <div class="form-group">
            <label>Название сервера</label>
            <input name="name" required placeholder="Например: мой-бот">
          </div>
          <div class="form-group">
            <label>Шаблон (runtime)</label>
            <select name="egg_id" required>
              ${eggs.map(e => `<option value="${e.id}">${escapeHtml(e.name)} — ${escapeHtml(e.docker_image)}</option>`).join("")}
            </select>
            <div class="muted" style="font-size:11px;margin-top:4px">Выберите язык/рантайм. Образ будет загружен автоматически при первом запуске.</div>
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
            <div class="form-group">
              <label>RAM (MB)</label>
              <input name="memory_mb" type="number" value="512" min="64">
            </div>
            <div class="form-group">
              <label>CPU (%)</label>
              <input name="cpu_limit" type="number" value="100" min="10" max="800">
            </div>
            <div class="form-group">
              <label>Диск (MB)</label>
              <input name="disk_mb" type="number" value="1024" min="64">
            </div>
          </div>
          <div class="form-group">
            <label>Команда запуска (опционально)</label>
            <input name="startup_cmd" placeholder="Если пусто — используется команда из шаблона">
          </div>
          <div class="card" style="padding:12px;background:var(--bg-3);margin:10px 0;">
            <div style="font-weight:600;margin-bottom:4px">GitHub автообновление</div>
            <div class="muted" style="font-size:12px;margin-bottom:10px">
              Перед стартом панель сможет сама сделать <code>git clone</code> или <code>git pull</code> в папке сервера.
            </div>
            <div class="form-group">
              <label>Git URL</label>
              <input name="git_repo" placeholder="https://github.com/user/repo.git">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
              <div class="form-group">
                <label>Ветка</label>
                <input name="git_branch" placeholder="main">
              </div>
              <div class="form-group">
                <label>Папка внутри сервера</label>
                <input name="git_subdir" placeholder="Например: bot">
              </div>
            </div>
            <label style="display:flex;align-items:center;gap:8px;font-size:13px;">
              <input name="git_auto_update" type="checkbox">
              <span>Обновлять из Git перед стартом/рестартом</span>
            </label>
          </div>
          <div class="modal-actions">
            <button type="button" class="btn btn-secondary" onclick="closeModal()">Отмена</button>
            <button class="btn btn-primary">Создать сервер</button>
          </div>
        </form>
      </div>
    </div>`;
  document.getElementById("createForm").addEventListener("submit", async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    try {
      await api.post("/api/servers", {
        name: fd.get("name"),
        egg_id: parseInt(fd.get("egg_id")),
        memory_mb: parseInt(fd.get("memory_mb")),
        cpu_limit: parseInt(fd.get("cpu_limit")),
        disk_mb: parseInt(fd.get("disk_mb")),
        startup_cmd: fd.get("startup_cmd") || "",
        git_repo: fd.get("git_repo") || "",
        git_branch: fd.get("git_branch") || "",
        git_subdir: fd.get("git_subdir") || "",
        git_auto_update: fd.get("git_auto_update") === "on",
      });
      closeModal();
      toast("Сервер создан", "success");
      load();
    } catch (err) { toast(err.message, "error"); }
  });
}

function closeModal() { document.getElementById("modal").innerHTML = ""; }

load();
</script>

<style>
.server-card:hover { border-color: var(--accent); text-decoration: none !important; }
</style>
</body>
</html>
